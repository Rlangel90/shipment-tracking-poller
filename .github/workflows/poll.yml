name: Scheduled Poll

on:
  schedule:
    - cron: "*/30 * * * *"
  workflow_dispatch:
    inputs:
      force_ids:
        description: "Comma-separated shipment_ids to force a re-poll of, bypassing terminal/staleness skip rules"
        type: string
        default: ""

jobs:
  poll:
    runs-on: ubuntu-latest
    # There's no standing warehouse or carrier API behind this repo, so the
    # whole stack - Postgres and the mock tracking API - is seeded and
    # started fresh each run purely to demonstrate the polling policy live
    # on a schedule. A real deployment would point these same functions at
    # a standing warehouse and the real carrier tracking API instead.
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: warehouse
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Seed synthetic tracking scenario
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/warehouse
        run: python scripts/seed_warehouse.py --seed 42 --count 60

      - name: Start mock carrier tracking API
        run: |
          nohup python -m mock_carrier.server > mock_carrier.log 2>&1 &
          for i in $(seq 1 20); do
            curl -s -o /dev/null http://localhost:8300/track/healthcheck && break
            sleep 0.5
          done

      - name: Poll shipments
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/warehouse
          CARRIER_API_URL: http://localhost:8300
          FORCE_REPOLL_IDS: ${{ github.event.inputs.force_ids }}
        run: python poll_shipments.py

      - name: Poll again to show terminal/stale shipments are now skipped
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/warehouse
          CARRIER_API_URL: http://localhost:8300
        run: python poll_shipments.py
