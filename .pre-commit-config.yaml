repos:
  - repo: local
    hooks:
      - id: check-secrets
        name: check for hardcoded credentials
        entry: python scripts/check_secrets.py
        language: system
        types: [text]
        # this hook's own test fixtures deliberately contain secret-shaped
        # strings to exercise the detector; excluded rather than commented
        # around so the fixtures stay realistic.
        exclude: ^tests/test_check_secrets\.py$
